spring.application.name=lumosaura-backend
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/lumosaura
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=lumos-aura-secret-key-change-this-in-production-must-be-at-least-256-bits
jwt.expiration=86400000

# CORS — allow FE dev server
cors.allowed-origins=http://localhost:5173,http://localhost:3000
