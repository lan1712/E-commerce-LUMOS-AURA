# ================================
# Test Profile Configuration
# ================================

# Use H2 in-memory database for tests (optional, can also use Testcontainers)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lumos_aura_test}
spring.datasource.username=${DB_USER:lumos}
spring.datasource.password=${DB_PASSWORD:lumos_secret}

# Allow Hibernate to auto-create schema for tests
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests (use JPA auto DDL instead)
spring.flyway.enabled=false

# JWT test secret
jwt.secret=test-secret-key-that-is-at-least-32-characters-long-for-testing

# Disable SQL logging in tests
spring.jpa.show-sql=false
