spring.application.name=BE

# ================================
# Database Configuration
# ================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:lumos_aura}
spring.datasource.username=${DB_USER:lumos}
spring.datasource.password=${DB_PASSWORD:lumos_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate Configuration
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ================================
# Flyway Migration Configuration
# ================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ================================
# JWT Configuration
# ================================
jwt.secret=${JWT_SECRET:default-dev-secret-key-must-be-at-least-32-chars-long}
jwt.expiration-ms=86400000

# ================================
# CORS Configuration
# ================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://comply-undamaged-gladiator.ngrok-free.dev}

# Google Identity
google.client-id=${GOOGLE_CLIENT_ID:576261992414-cji8nuodh4qp7nqoevjks9cad1b9n69s.apps.googleusercontent.com}

# ================================
# Mail Configuration
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================================
# Server Configuration
# ================================
server.port=${PORT:8081}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================
# Jackson JSON Configuration
# ================================
spring.jackson.default-property-inclusion=non_null

# ================================
# Docker Compose
# Container is managed manually: docker compose up -d
# Spring Boot connects directly to port 5433
# ================================
spring.docker.compose.enabled=false

