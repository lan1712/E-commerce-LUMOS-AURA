spring.application.name=BE

# ================================
# Database Configuration
# ================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lumos_aura}
spring.datasource.username=${DB_USER:lumos}
spring.datasource.password=${DB_PASSWORD:lumos_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate Configuration
# ================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ================================
# Flyway Migration Configuration
# ================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ================================
# JWT Configuration
# ================================
jwt.secret=${JWT_SECRET:default-dev-secret-key-must-be-at-least-32-chars-long}
jwt.expiration-ms=86400000

# ================================
# CORS Configuration
# ================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ================================
# Server Configuration
# ================================
server.port=${PORT:8080}

# ================================
# Jackson JSON Configuration
# ================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
