services:
  postgres:
    image: 'postgres:16'
    container_name: lumos-aura-postgres
    environment:
      - 'POSTGRES_DB=lumos_aura'
      - 'POSTGRES_USER=lumos'
      - 'POSTGRES_PASSWORD=lumos_secret'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lumos -d lumos_aura']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
